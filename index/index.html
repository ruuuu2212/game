<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>かわいいマリオ風ゲーム</title>
<style>
body {
    margin: 0;
    background: #aee1ff;
}

#game {
    position: relative;
    width: 800px;
    height: 400px;
    margin: auto;
    overflow: hidden;
    border-radius: 20px;
    border: 4px solid white;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
    background: linear-gradient(#aee1ff, #e0f7ff);
}

/* ☁️ 雲 */
.cloud {
    position: absolute;
    width: 80px;
    height: 50px;
    background: white;
    border-radius: 50px;
}

.cloud::before,
.cloud::after {
    content: "";
    position: absolute;
    background: white;
    border-radius: 50%;
}

.cloud::before {
    width: 50px;
    height: 50px;
    top: -20px;
    left: 10px;
}

.cloud::after {
    width: 60px;
    height: 60px;
    top: -25px;
    left: 30px;
}

/* 🌈 プレイヤー */
#player {
    position: absolute;
    width: 40px;
    height: 40px;
    background: pink;
    border-radius: 50%;
    border: 3px solid white;
}

/* 👾 敵 */
.enemy {
    position: absolute;
    width: 40px;
    height: 40px;
    background: plum;
    border-radius: 50%;
    border: 3px solid white;
}

/* 🏁 ゴール */
#goal {
    position: absolute;
    width: 40px;
    height: 80px;
    background: linear-gradient(pink, gold);
    border-radius: 10px;
}

/* 🌱 地面 */
.ground {
    position: absolute;
    width: 100%;
    height: 60px;
    background: #8ee4af;
    bottom: 0;
    border-top: 4px solid #5ccf8a;
}
</style>
</head>
<body>

<div id="game">

    <!-- ☁️ 雲 -->
    <div class="cloud" style="top:50px; left:100px;"></div>
    <div class="cloud" style="top:80px; left:500px;"></div>

    <div id="player"></div>

    <div class="enemy" style="left:400px; top:310px;"></div>
    <div class="enemy" style="left:650px; top:310px;"></div>

    <div id="goal" style="right:20px; top:260px;"></div>

    <div class="ground"></div>
</div>

<script>
const player = document.getElementById("player");

let x = 50;
let y = 310;
let velocityY = 0;
let isJumping = false;

let keys = {};

document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

function gameLoop() {
    if (keys["ArrowRight"]) x += 5;
    if (keys["ArrowLeft"]) x -= 5;

    if (keys["Space"] && !isJumping) {
        velocityY = -15;
        isJumping = true;
    }

    velocityY += 0.8;
    y += velocityY;

    if (y >= 310) {
        y = 310;
        isJumping = false;
    }

    player.style.left = x + "px";
    player.style.top = y + "px";

    checkCollision();

    requestAnimationFrame(gameLoop);
}

function checkCollision() {
    const playerRect = player.getBoundingClientRect();

    document.querySelectorAll(".enemy").forEach(enemy => {
        const rect = enemy.getBoundingClientRect();
        if (isColliding(playerRect, rect)) {
            alert("ゲームオーバー！");
            location.reload();
        }
    });

    const goal = document.getElementById("goal").getBoundingClientRect();
    if (isColliding(playerRect, goal)) {
        alert("クリア！！！");
        location.reload();
    }
}

function isColliding(a, b) {
    return !(
        a.top > b.bottom ||
        a.bottom < b.top ||
        a.right < b.left ||
        a.left > b.right
    );
}

gameLoop();
</script>

</body>
</html>
